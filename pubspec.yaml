name: ciervo_landing
description: Landing oficial de Ciervo Club - Flutter Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  visibility_detector: ^0.4.0+2
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.8.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/logos/icon_sin_fondo.png
    - assets/mockups/
    - assets/animations/
